<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Counter</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div class="Main-container">
            <div class="counterForm">
                <h1 id="counterPhrase" class="myh2">Counter Application</h1>
                <h2 id="counterNum" class="myParagraph">0</h2>
                <button id="incBtn" class="myButton">Increase</button>
                <button id="resetBtn" class="myButton">Reset</button>
                <button id="decBtn" class="myButton">Decrease</button><br>
                <button id="saveBtn" class="myButton">Save</button>
                <p id="counterPrev" class="myParagraph2">Previous Entries: </p>
            </div>
        </div>
        
    </body>
    <script src="script.js"></script>
</html>
