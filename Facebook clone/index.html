<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Facebook Clone</title>
        <link rel="stylesheet" href="style.css"/>
    </head>
    <body>
        
        
        <img src="https://static.xx.fbcdn.net/rsrc.php/y1/r/4lCu2zih0ca.svg" width="300" class="logo"/>
        <h2 class="paragraph">Connect with friends and the world<br>
            around you on Facebook</h2>

        <div class="login-container">
            <input type="text" placeholder="Email or phone number"/>
            <input type="password" placeholder="Password"/>
            <button class="btn-login">Log In</button>
            <a class="forgot" href="#">Forgot password?</a>
            
            <hr/>

            <button class="btn-create">Create new account</button>
        </div>

        <p class="below-text"><a class="create-page">Create a Page</a> for a celebrity, brand of business.</p>


    </body>
</html>
